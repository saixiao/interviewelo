services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewelo
      POSTGRES_PASSWORD: interviewelo
      POSTGRES_DB: interviewelo
    ports:
      - "5432:5432"
    volumes:
      - interviewelo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewelo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  interviewelo_pg_data:
